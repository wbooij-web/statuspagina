<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ICT Statusmonitor</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Afdeling ICT</p>
      <h1>Statusmonitor</h1>
    </div>
    <img class="site-logo" src="./vo-campus-logo.png" alt="voCampus">
  </header>

  <main class="shell">
    <section class="hero monitor-hero">
      <div>
        <p class="eyebrow">Live overzicht</p>
        <h2>Actuele status van onze belangrijkste ICT-systemen</h2>
        <p class="intro">Bekijk in een oogopslag welke diensten normaal werken en waar aandacht nodig is.</p>
      </div>
      <div class="summary" aria-label="Statussamenvatting">
        <div>
          <span id="count-green">0</span>
          <small>Groen</small>
        </div>
        <div>
          <span id="count-orange">0</span>
          <small>Oranje</small>
        </div>
        <div>
          <span id="count-red">0</span>
          <small>Rood</small>
        </div>
      </div>
    </section>

    <section class="status-board" aria-label="Statussen systemen">
      <div class="board-head">
        <div>
          <h2>Systemen</h2>
          <p>Laatst bijgewerkt: <time id="last-updated">-</time></p>
        </div>
        <button class="ghost-button" id="refresh-button" type="button">Vernieuwen</button>
      </div>
      <div class="status-grid" id="status-grid"></div>
      <p class="empty-state" id="empty-state" hidden>Er zijn nog geen systemen toegevoegd.</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
